{% extends "base.html" %}
{% block title %}Login — Business Command Center{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h1 class="login-card__title">Business Command Center</h1>
        <p class="login-card__subtitle">Sign in to access your dashboard</p>

        <form method="POST" action="{{ url_for('auth.login_submit') }}" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn--primary btn--full">Sign In</button>
        </form>

        <p class="login-card__hint">Demo credentials: admin / demo123</p>
    </div>
</div>
{% endblock %}
